; Overrides for Alpine's packaged php-fpm defaults. Included last via php-fpm.conf's
; include=/etc/php84/php-fpm.d/*.conf ("zz-" sorts after "www.conf"), so these win
; without patching the packaged file — surviving php84-fpm package upgrades.

[global]
; Log to the container's stderr so `docker logs` shows php-fpm errors
; (the packaged default is a file under /var/log/php84 that docker logs never sees).
error_log = /proc/self/fd/2

[www]
; The packaged default binds 127.0.0.1 only, unreachable from the nginx container.
listen = 0.0.0.0:9000
; Forward worker stderr (PHP notices/fatals) to the master's log target.
catch_workers_output = yes
; Alpine's packaged default is clear_env = yes, which strips docker-compose's
; `environment:` overrides (GOOGLE_CLIENT_ID, SKIP_AUTH) from FPM workers even
; though they're visible to `docker exec`/CLI. Without this, those overrides
; silently fall back to whatever backend/.env says.
clear_env = no
