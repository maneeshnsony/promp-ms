name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespwd
          POSTGRES_DB: prompt_ms_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, mbstring, intl, tokenizer, xml, dom, curl, fileinfo, zip, pcov
          coverage: pcov

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        working-directory: backend
        env:
          database.tests.hostname: 127.0.0.1
          database.tests.database: prompt_ms_test
          database.tests.username: postgres
          database.tests.password: postgrespwd
          database.tests.DBDriver: Postgre
          database.tests.port: "5432"
        run: composer test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Unit tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_SKIP_AUTH: "true"
          API_BASE_URL: http://localhost
          NEXT_PUBLIC_API_BASE_URL: http://localhost
          AUTH_SECRET: ci-build-only-secret
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose build
        run: docker compose build
